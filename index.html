function checklistItemHtml(item) {
  const st = getStatus(item), cfg = STATUSES[st]||STATUSES[''];
  const critVal = item.criticity||'';
  return `<div class="checklist-item" data-iid="${item.id}">
    <input type="checkbox" class="item-select-cb" data-iid="${item.id}" aria-label="Sélectionner cette tâche">
    <button class="task-check ${cfg.cls}" data-iid="${item.id}" title="${cfg.label}" aria-label="${cfg.label}">${cfg.sigil||''}</button>
    <span class="checklist-text${st==='done'?' done':''}">${item.text}</span>
    <select class="crit-select" data-iid="${item.id}" title="Criticité" aria-label="Criticité de la tâche" style="flex-shrink:0">
      <option value="" disabled${!critVal?' selected':''}>Criticité…</option>
      <option value=""${critVal===''?' selected':''}>—</option>
      ${CRITICITIES.map(c=>`<option value="${c}"${critVal===c?' selected':''}>${CRIT_LABELS[c]}</option>`).join('')}
    </select>
    <input class="date-input" type="date" data-iid="${item.id}" data-field="start_date" value="${item.start_date||''}" title="Date de début" aria-label="Date de début" style="width:110px">
    <input class="date-input" type="date" data-iid="${item.id}" data-field="due_date" value="${item.due_date||''}" title="Date d'échéance" aria-label="Date d'échéance" style="width:110px">
    <button class="checklist-del" data-iid="${item.id}" title="Supprimer" aria-label="Supprimer la tâche">
      <i class="bi bi-trash3" style="font-size:12px"></i>
    </button>
  </div>`;
}

function toggleItemInline(iid, note) {
  const item = (note.checklist||[]).find(i=>i.id===iid); if(!item) return;
  item.status = nextStatus(getStatus(item));
  item.done = item.status === 'done';
  item.completedAt = item.done ? Date.now() : null;
  const cont = document.getElementById('checklist-items'); if(!cont) return;
  const row = cont.querySelector(`[data-iid="${iid}"]`); if(!row) return;
  const st = getStatus(item), cfg = STATUSES[st]||STATUSES[''];
  const cb = row.querySelector('.task-check');
  if(cb) { cb.className=`task-check ${cfg.cls}`; cb.textContent=cfg.sigil||''; cb.title=cfg.label; }
  const tx = row.querySelector('.checklist-text');
  if(tx) { tx.className=`checklist-text${st==='done'?' done':''}`; }
}

function deleteItemInline(iid, note) {
  note.checklist = (note.checklist||[]).filter(i=>i.id!==iid);
  document.getElementById('checklist-items')?.querySelector(`[data-iid="${iid}"]`)?.remove();
}

function updateItemCriticity(iid, note, val) {
  const item = (note.checklist||[]).find(i=>i.id===iid); if(!item) return;
  item.criticity = val;
}

function updateItemDate(iid, note, field, val) {
  const item = (note.checklist||[]).find(i=>i.id===iid); if(!item) return;
  item[field] = val || null;
}

function addItemInline(note) {
  const inp = document.getElementById('new-item-text'); if(!inp) return;
  const text = inp.value.trim(); if(!text) return;
  const item = { id:uid(), text, status:'', done:false, priority:null, criticity:'', start_date:null, due_date:null, completedAt:null };
  note.checklist = [...(note.checklist||[]), item];
  inp.value = '';
  const cont = document.getElementById('checklist-items'); if(!cont) return;
  cont.insertAdjacentHTML('beforeend', checklistItemHtml(item));
  const newRow = cont.querySelector(`[data-iid="${item.id}"]`); if(!newRow) return;
  newRow.querySelector('.task-check')?.addEventListener('click', () => toggleItemInline(item.id, note));
  newRow.querySelector('.checklist-del')?.addEventListener('click', () => deleteItemInline(item.id, note));
  newRow.querySelector('.crit-select')?.addEventListener('change', e => updateItemCriticity(item.id, note, e.target.value));
  newRow.querySelectorAll('.date-input').forEach(inp2 => {
    inp2.addEventListener('change', () => updateItemDate(item.id, note, inp2.dataset.field, inp2.value));
  });
  inp.focus();
}

// ── Save note ─────────────────────────────────────────
async function saveNote() {
  const modal = document.getElementById('modal-note'); if(!modal) return;
  const nid = editingNoteId;
  const existingIdx = notes.findIndex(n=>n.id===nid);
  const existing = existingIdx>=0 ? notes[existingIdx] : null;

  const titleEl = document.getElementById('note-title-input');
  const contentEl = document.getElementById('note-content');
  const typeBtns = modal.querySelectorAll('.type-btn');
  const activeType = [...typeBtns].find(b => b.classList.contains('btn-primary'))?.dataset.type || (existing?.type||'note');
  const selectedColor = modal.querySelector('.color-swatch.selected')?.dataset.color || '#FFFFFF';
  const selectedTags = [...modal.querySelectorAll('.tag-cb:checked')].map(c=>c.dataset.tid);

  const checklist = existing ? [...(existing.checklist||[])] : [];

  const note = {
    id: nid,
    title: titleEl?.value?.trim() || '',
    type: activeType,
    content: activeType==='note' ? (contentEl?.innerHTML||'') : '',
    checklist: activeType==='task' ? checklist : [],
    tags: selectedTags,
    color: selectedColor,
    createdAt: existing?.createdAt || Date.now(),
    updatedAt: Date.now(),
  };
  await dbPut('notes', note);
  if(existingIdx>=0) notes[existingIdx] = note; else notes.unshift(note);
  scheduleAutoExport();
  document.getElementById('modal-note')?.classList.remove('open');
  editingNoteId = null;
  render();
  showToast('Note enregistrée');
}

async function deleteNote() {
  if(!editingNoteId) return;
  if(!confirm('Supprimer cette note ?')) return;
  await dbDelete('notes', editingNoteId);
  notes = notes.filter(n=>n.id!==editingNoteId);
  scheduleAutoExport();
  document.getElementById('modal-note')?.classList.remove('open');
  editingNoteId = null;
  render();
  showToast('Note supprimée');
}

// ── Tâches ────────────────────────────────────────────
function getAllTasks() {
  const tasks = [];
  notes.forEach(n => {
    if(n.type!=='task') return;
    const noteTags = (n.tags||[]).map(tid => { const t=tags.find(x=>x.id===tid); return t?t.name:null; }).filter(Boolean);
    const tagLabel = noteTags[0] || null;
    (n.checklist||[]).forEach(item => {
      if(item.separator) return;
      tasks.push({ ...item, noteId:n.id, noteTitle:n.title||'Sans titre', tagLabel });
    });
  });
  return tasks;
}

async function toggleTask(noteId, itemId) {
  const note = notes.find(n=>n.id===noteId); if(!note) return;
  const item = (note.checklist||[]).find(i=>i.id===itemId); if(!item) return;
  item.status = nextStatus(getStatus(item));
  item.done = item.status==='done';
  item.completedAt = item.done ? Date.now() : null;
  note.updatedAt = Date.now();
  await dbPut('notes', note);
  scheduleAutoExport();
  render();
}

async function cyclePriority(noteId, itemId) {
  const note = notes.find(n=>n.id===noteId); if(!note) return;
  const item = (note.checklist||[]).find(i=>i.id===itemId); if(!item) return;
  item.priority = nextPriority(item.priority||'none');
  note.updatedAt = Date.now();
  await dbPut('notes', note);
  scheduleAutoExport();
  render();
}

// ── Tags ──────────────────────────────────────────────
async function addTag() {
  const inp = document.getElementById('new-tag-input'); if(!inp) return;
  const name = inp.value.trim(); if(!name) return;
  if(tags.find(t=>t.name.toLowerCase()===name.toLowerCase())) { showToast('Cette étiquette existe déjà'); return; }
  const tag = { id:uid(), name };
  tags.push(tag);
  await dbPut('tags', tag);
  inp.value = '';
  scheduleAutoExport();
  render();
}

async function deleteTag(tid) {
  if(!confirm('Supprimer cette étiquette ?')) return;
  tags = tags.filter(t=>t.id!==tid);
  notes = notes.map(n => ({ ...n, tags:(n.tags||[]).filter(id=>id!==tid) }));
  await dbDelete('tags', tid);
  for(const n of notes) await dbPut('notes', n);
  scheduleAutoExport();
  render();
}

// ── Chiffrement AES-256-GCM ───────────────────────────
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, hash:'SHA-256', iterations:100000 },
    keyMat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptData(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);
  const enc  = new TextEncoder();
  const ct   = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(plaintext));
  return JSON.stringify({
    enc: btoa(String.fromCharCode(...new Uint8Array(ct))),
    salt: btoa(String.fromCharCode(...salt)),
    iv:   btoa(String.fromCharCode(...iv))
  });
}
async function decryptData(payload, password) {
  const { enc, salt, iv } = JSON.parse(payload);
  const toBytes = b => new Uint8Array(atob(b).split('').map(c=>c.charCodeAt(0)));
  const key = await deriveKey(password, toBytes(salt));
  const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv: toBytes(iv) }, key, toBytes(enc));
  return new TextDecoder().decode(pt);
}

// ── Export / Import ───────────────────────────────────
async function exportJSON(encrypt=false) {
  const data = JSON.stringify({ notes, tags, version: APP_VERSION, exportedAt: new Date().toISOString() }, null, 2);
  let blob, filename;
  if(encrypt) {
    const pwd = prompt('Mot de passe pour chiffrer l\'export :');
    if(!pwd) return;
    const pwd2 = prompt('Confirmez le mot de passe :');
    if(pwd !== pwd2) { showToast('Les mots de passe ne correspondent pas'); return; }
    const encrypted = await encryptData(data, pwd);
    blob = new Blob([encrypted], {type:'application/json'});
    filename = `notes-export-${today()}.enc.json`;
  } else {
    blob = new Blob([data], {type:'application/json'});
    filename = `notes-export-${today()}.json`;
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(encrypt ? 'Export chiffré téléchargé' : 'Export téléchargé');
}

async function importJSON(e) {
  const file = e.target.files?.[0]; if(!file) return;
  const text = await file.text();
  try {
    let data;
    const isEncrypted = file.name.endsWith('.enc.json');
    if(isEncrypted) {
      const pwd = prompt('Mot de passe pour déchiffrer ce fichier :');
      if(!pwd) return;
      try { data = JSON.parse(await decryptData(text, pwd)); }
      catch(e) { showToast('Mot de passe incorrect ou fichier corrompu'); return; }
    } else {
      data = JSON.parse(text);
    }
    if(!data.notes || !Array.isArray(data.notes)) throw new Error('Format invalide');
    const nCount = data.notes.length, tCount = (data.tags||[]).length;
    if(!confirm(`Importer ${nCount} note${nCount>1?'s':''} et ${tCount} étiquette${tCount>1?'s':''} ?\n\nAttention : les données actuelles seront remplacées.`)) return;
    for(const n of notes) await dbDelete('notes', n.id);
    for(const t of tags) await dbDelete('tags', t.id);
    notes = data.notes; tags = data.tags||[];
    for(const n of notes) await dbPut('notes', n);
    for(const t of tags) await dbPut('tags', t);
    scheduleAutoExport();
    render();
    showToast(`Import réussi — ${nCount} note${nCount>1?'s':''}${tCount?', '+tCount+' étiquette'+(tCount>1?'s':''):''}`);
  } catch(err) {
    showToast('Erreur lors de l\'import : format invalide');
  }
  e.target.value = '';
}

// ── Rapport ───────────────────────────────────────────
function openReport() {
  const modal = document.getElementById('modal-report');
  const body  = document.getElementById('modal-report-body');
  if(!modal || !body) return;

  const STATUSES_FILTER = ['doing','waiting','','done'];
  const STATUS_LABELS   = {'doing':'En cours','waiting':'En attente','':'Pas commencées','done':'Terminées'};
  const PERIODS = [
    { value:'week',  label:'Cette semaine' },
    { value:'2weeks',label:'2 semaines' },
    { value:'month', label:'Ce mois' },
    { value:'all',   label:'Tout' },
  ];

  let selStatuses = new Set(STATUSES_FILTER);
  let selTags     = new Set();   // vide = toutes
  let selCrits    = new Set();   // vide = toutes
  let selPeriod   = 'week';

  function periodRange(p) {
    const now = new Date(); now.setHours(0,0,0,0);
    const start = new Date(now);
    if(p==='week')   { start.setDate(now.getDate()-now.getDay()+1); }
    else if(p==='2weeks') { start.setDate(now.getDate()-13); }
    else if(p==='month')  { start.setDate(1); }
    else return null;
    return { from: start.toISOString().slice(0,10), to: new Date(now.getTime()+86400000*6).toISOString().slice(0,10) };
  }

  function renderReport() {
    const range  = periodRange(selPeriod);
    const allT   = getAllTasks();
    const filtered = allT.filter(t => {
      if(!selStatuses.has(getStatus(t))) return false;
      if(selTags.size) {
        const noteTags = notes.find(n=>n.id===t.noteId)?.tags||[];
        if(!noteTags.some(tid=>selTags.has(tid))) return false;
      }
      if(selCrits.size && !selCrits.has(t.criticity||'faible')) return false;
      if(range) {
        const d = t.due_date||t.start_date;
        if(d && (d < range.from || d > range.to)) return false;
      }
      return true;
    });

    const periodLabel = PERIODS.find(p=>p.value===selPeriod)?.label || '';
    const tagLabel    = selTags.size  ? [...selTags].map(tid=>tags.find(t=>t.id===tid)?.name||'').join(', ')  : 'toutes';
    const critLabel   = selCrits.size ? [...selCrits].map(c=>CRIT_LABELS[c]||c).join(', ') : 'toutes';

    const md = [
      `# Rapport de tâches`,
      `Date : ${new Date().toLocaleDateString('fr-FR')}`,
      `Période : ${periodLabel} | Étiquettes : ${tagLabel} | Criticité : ${critLabel}`,
      `Total : ${filtered.length} tâche${filtered.length>1?'s':''}`,
      '',
    ];
    STATUSES_FILTER.forEach(s => {
      if(!selStatuses.has(s)) return;
      const grp = filtered.filter(t=>getStatus(t)===s)
        .sort((a,b)=>(CRIT_ORDER[a.criticity||'faible']||3)-(CRIT_ORDER[b.criticity||'faible']||3));
      if(!grp.length) return;
      md.push(`## ${STATUS_LABELS[s]} (${grp.length})`);
      grp.forEach(t => md.push(`- [${CRIT_LABELS[t.criticity||'faible']}] ${t.text} (${t.noteTitle})`));
      md.push('');
    });
    document.getElementById('report-output').textContent = md.join('\n');
  }

  const tagCheckboxes = tags.map(t =>
    `<label style="display:flex;align-items:center;gap:5px;font-size:12px">
      <input type="checkbox" class="rep-tag-cb" data-tid="${t.id}" aria-label="${t.name}"> ${t.name}
    </label>`).join('');
  const critCheckboxes = ['critique','elevee','moyenne','faible'].map(c =>
    `<label style="display:flex;align-items:center;gap:5px;font-size:12px">
      <input type="checkbox" class="rep-crit-cb" data-crit="${c}" aria-label="${CRIT_LABELS[c]}"> ${CRIT_LABELS[c]}
    </label>`).join('');

  body.innerHTML = `
    <div class="report-step">
      <h3>Période</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${PERIODS.map(p=>`<button class="filter-pill${selPeriod===p.value?' active':''}" data-period="${p.value}">${p.label}</button>`).join('')}
      </div>
    </div>
    <div class="report-step">
      <h3>Statuts</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${STATUSES_FILTER.map(s=>`<label style="display:flex;align-items:center;gap:5px;font-size:12px">
          <input type="checkbox" checked class="rep-stat-cb" data-status="${s}" aria-label="${STATUS_LABELS[s]}"> ${STATUS_LABELS[s]}
        </label>`).join('')}
      </div>
    </div>
    ${tags.length ? `<div class="report-step">
      <h3>Étiquettes <span style="font-weight:400;color:var(--text3)">(vide = toutes)</span></h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${tagCheckboxes}</div>
    </div>` : ''}
    <div class="report-step">
      <h3>Criticité <span style="font-weight:400;color:var(--text3)">(vide = toutes)</span></h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${critCheckboxes}</div>
    </div>
    <div class="report-step">
      <h3>Rapport</h3>
      <pre class="report-output" id="report-output"></pre>
      <button class="btn btn-secondary" id="btn-copy-report" style="margin-top:8px"><i class="bi bi-clipboard"></i> Copier</button>
    </div>`;

  renderReport();

  body.querySelectorAll('[data-period]').forEach(btn => {
    btn.addEventListener('click', () => {
      selPeriod = btn.dataset.period;
      body.querySelectorAll('[data-period]').forEach(b => b.classList.toggle('active', b.dataset.period===selPeriod));
      renderReport();
    });
  });
  body.querySelectorAll('.rep-stat-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if(cb.checked) selStatuses.add(cb.dataset.status); else selStatuses.delete(cb.dataset.status);
      renderReport();
    });
  });
  body.querySelectorAll('.rep-tag-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if(cb.checked) selTags.add(cb.dataset.tid); else selTags.delete(cb.dataset.tid);
      renderReport();
    });
  });
  body.querySelectorAll('.rep-crit-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if(cb.checked) selCrits.add(cb.dataset.crit); else selCrits.delete(cb.dataset.crit);
      renderReport();
    });
  });
  on('btn-copy-report','click', () => {
    navigator.clipboard.writeText(document.getElementById('report-output')?.textContent||'').then(()=>showToast('Copié !'));
  });
  modal.classList.add('open');
}

// ── Vérification MAJ ──────────────────────────────────
async function checkForUpdate() {
  if(!location.hostname || location.hostname==='localhost') return;
  const lastCheck = parseInt(localStorage.getItem('update-last-check')||'0');
  if(Date.now()-lastCheck < 3600000) return;
  localStorage.setItem('update-last-check', Date.now());
  try {
    const res = await fetch('./version.json?t='+Date.now(), {cache:'no-store'});
    if(!res.ok) return;
    const data = await res.json();
    if(data.version && data.version !== APP_VERSION) {
      const dismissed = localStorage.getItem('update-dismissed');
      if(dismissed === data.version) return;
      const banner = document.getElementById('update-banner');
      const msg = document.getElementById('update-msg');
      if(banner) { if(msg) msg.textContent=`Nouvelle version v${data.version}${data.summary?' — '+data.summary:''}`;  banner.classList.add('visible'); }
    }
  } catch(e) {}
}

// ── Init ──────────────────────────────────────────────
async function init() {
  applyTheme();
  try { db = await openDB(); } catch(e) {
    const backup = localStorage.getItem('notes-backup');
    if(backup) { try { const d=JSON.parse(backup); notes=d.notes||[]; tags=d.tags||[]; } catch(e2) {} }
    render(); setSyncStatus('saved'); return;
  }
  [notes, tags] = await Promise.all([dbGetAll('notes'), dbGetAll('tags')]);
  render(); setSyncStatus('saved');
  setTimeout(checkForUpdate, 2000);
}

// ── Events globaux ────────────────────────────────────
// ── Redimensionnement modale note ─────────────────────
(function() {
  const handle = document.getElementById('modal-note-handle');
  const modal  = document.getElementById('modal-note-inner');
  if(!handle || !modal) return;
  let startY = 0, startH = 0, dragging = false;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    startH = modal.offsetHeight;
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  handle.addEventListener('touchstart', e => {
    dragging = true;
    startY = e.touches[0].clientY;
    startH = modal.offsetHeight;
    e.preventDefault();
  }, { passive: false });
  window.addEventListener('mousemove', e => {
    if(!dragging) return;
    const dy = startY - e.clientY; // tirer vers le haut = agrandir
    const newH = Math.min(Math.max(startH + dy, 300), window.innerHeight * 0.95);
    modal.style.maxHeight = newH + 'px';
    modal.style.height = newH + 'px';
  });
  window.addEventListener('touchmove', e => {
    if(!dragging) return;
    const dy = startY - e.touches[0].clientY;
    const newH = Math.min(Math.max(startH + dy, 300), window.innerHeight * 0.95);
    modal.style.maxHeight = newH + 'px';
    modal.style.height = newH + 'px';
  });
  window.addEventListener('mouseup', () => { dragging = false; document.body.style.userSelect = ''; });
  window.addEventListener('touchend', () => { dragging = false; });
})();
